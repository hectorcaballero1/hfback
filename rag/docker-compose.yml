version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  retrieval:
    build: ./retrieval
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: triage_docs
    depends_on:
      - qdrant
    restart: unless-stopped

  seeder:
    build: ./seeder
    volumes:
      - ./corpus:/corpus
    environment:
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: triage_docs
      CORPUS_PATH: /corpus
    depends_on:
      - qdrant
    restart: "no"
